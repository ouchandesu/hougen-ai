<!DOCTYPE html>
<!-- 管理者専用ダッシュボード：閲覧のみ。サーバー側で is_admin を検証済みのデータのみ表示する -->
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理者ダッシュボード — 方言ナビ</title>
  <style>
    /* ── CSS変数（main と共通） ─────────────────────────── */
    :root {
      --black:    #0a0a0a;
      --white:    #ffffff;
      --gray-50:  #f7f7f7;
      --gray-100: #efefef;
      --gray-200: #e0e0e0;
      --gray-400: #aaaaaa;
      --gray-600: #666666;
      --gray-800: #2a2a2a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial,
                   'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      background: var(--gray-50);
      color: var(--black);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── ヘッダー ─────────────────────────────────────── */
    header {
      background: var(--black);
      color: var(--white);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .header-left { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
    .header-title { font-size: 1.1rem; font-weight: 700; letter-spacing: 0.04em; }
    .header-badge {
      background: var(--gray-800);
      color: var(--gray-400);
      border: 1px solid var(--gray-600);
      border-radius: 2px;
      padding: 2px 10px;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .user-email { font-size: 0.75rem; color: var(--gray-400); }
    .back-link {
      font-size: 0.75rem;
      color: var(--gray-400);
      border: 1px solid var(--gray-600);
      border-radius: 2px;
      padding: 5px 12px;
      text-decoration: none;
      transition: color 0.12s, border-color 0.12s;
      white-space: nowrap;
    }
    .back-link:hover { color: var(--white); border-color: var(--white); }

    /* ── コンテナ ─────────────────────────────────────── */
    .container { max-width: 960px; margin: 0 auto; padding: 28px 16px 60px; }

    /* ── セクションヘッダー ───────────────────────────── */
    .section-title {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gray-400);
      margin-bottom: 12px;
      margin-top: 28px;
    }
    .section-title:first-child { margin-top: 0; }

    /* ── カード ──────────────────────────────────────── */
    .card {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: 4px;
      padding: 22px 24px;
      margin-bottom: 14px;
    }

    /* ── サマリーカードグリッド ───────────────────────── */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }
    .stat-card {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: 4px;
      padding: 20px 22px;
    }
    .stat-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gray-400);
      margin-bottom: 8px;
    }
    .stat-value {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--black);
      line-height: 1;
    }
    .stat-unit {
      font-size: 0.85rem;
      font-weight: 400;
      color: var(--gray-400);
      margin-left: 4px;
    }

    /* ── 横棒グラフ ───────────────────────────────────── */
    .bar-list { list-style: none; }
    .bar-item {
      display: grid;
      grid-template-columns: 140px 1fr 48px;
      align-items: center;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid var(--gray-100);
    }
    .bar-item:last-child { border-bottom: none; }
    .bar-label { font-size: 0.85rem; color: var(--black); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar-track { background: var(--gray-100); border-radius: 2px; height: 8px; overflow: hidden; }
    .bar-fill  { height: 100%; background: var(--black); border-radius: 2px; transition: width 0.5s ease; }
    .bar-count { font-size: 0.82rem; font-weight: 600; color: var(--gray-600); text-align: right; }

    /* ── ユーザーテーブル ─────────────────────────────── */
    .user-table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.86rem;
    }
    th {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gray-400);
      text-align: left;
      padding: 0 12px 12px 0;
      border-bottom: 1px solid var(--gray-200);
      white-space: nowrap;
    }
    td {
      padding: 11px 12px 11px 0;
      border-bottom: 1px solid var(--gray-100);
      color: var(--black);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--gray-50); }
    .admin-badge {
      display: inline-block;
      background: var(--black);
      color: var(--white);
      border-radius: 2px;
      padding: 1px 7px;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      vertical-align: middle;
      margin-left: 6px;
    }
    .plan-badge {
      display: inline-block;
      background: var(--gray-100);
      color: var(--gray-600);
      border-radius: 2px;
      padding: 2px 8px;
      font-size: 0.72rem;
      font-weight: 600;
    }
    .date-text { color: var(--gray-600); white-space: nowrap; }
    .never-text { color: var(--gray-400); font-size: 0.8rem; }

    /* ── ローディング / エラー ────────────────────────── */
    @keyframes spin { to { transform: rotate(360deg); } }
    #page-loading {
      text-align: center;
      padding: 80px 16px;
      color: var(--gray-600);
    }
    #page-loading .spinner {
      display: inline-block;
      width: 28px; height: 28px;
      border: 2px solid var(--gray-200);
      border-top-color: var(--black);
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      margin-bottom: 14px;
    }
    #page-loading p { font-size: 0.8rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gray-400); }
    #page-error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 4px;
      padding: 20px 24px;
      color: #b91c1c;
      font-size: 0.9rem;
      margin: 28px 0;
    }
    #page-error strong { display: block; margin-bottom: 6px; font-size: 1rem; }

    /* ── 最終更新 ─────────────────────────────────────── */
    .last-updated {
      font-size: 0.7rem;
      color: var(--gray-400);
      letter-spacing: 0.08em;
      margin-top: 20px;
      text-align: right;
    }

    /* ── モバイル調整 ─────────────────────────────────── */
    @media (max-width: 600px) {
      .bar-item { grid-template-columns: 100px 1fr 40px; }
      th, td { padding-right: 8px; }
    }
  </style>
</head>
<body>

  <!-- ヘッダー -->
  <header>
    <div class="header-left">
      <span class="header-title">方言ナビ</span>
      <span class="header-badge">Admin</span>
    </div>
    <div class="header-right">
      <span class="user-email" id="admin-email"></span>
      <a href="/" class="back-link">← メインへ</a>
    </div>
  </header>

  <div class="container">

    <!-- ローディング（初期表示） -->
    <div id="page-loading">
      <div class="spinner"></div>
      <p>読み込み中...</p>
    </div>

    <!-- エラー表示エリア -->
    <div id="page-error" style="display:none">
      <strong id="error-title">エラー</strong>
      <span  id="error-body"></span>
    </div>

    <!-- ダッシュボード本体（データ取得後に表示） -->
    <div id="dashboard" style="display:none">

      <!-- 今月のサマリー -->
      <div class="section-title">今月のサマリー</div>
      <div class="summary-grid">
        <div class="stat-card">
          <div class="stat-label">総利用回数</div>
          <div class="stat-value" id="stat-total">—<span class="stat-unit">回</span></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">アクティブユーザー</div>
          <div class="stat-value" id="stat-users">—<span class="stat-unit">人</span></div>
        </div>
      </div>

      <!-- 地域別利用回数 -->
      <div class="section-title">地域別利用回数（今月）</div>
      <div class="card">
        <ul class="bar-list" id="region-bars">
          <li style="color:var(--gray-400);font-size:0.85rem;padding:12px 0">データなし</li>
        </ul>
      </div>

      <!-- アクション別利用回数 -->
      <div class="section-title">アクション別利用回数（今月）</div>
      <div class="card">
        <ul class="bar-list" id="action-bars">
          <li style="color:var(--gray-400);font-size:0.85rem;padding:12px 0">データなし</li>
        </ul>
      </div>

      <!-- ユーザー一覧 -->
      <div class="section-title">ユーザー一覧</div>
      <div class="card">
        <div class="user-table-wrap">
          <table>
            <thead>
              <tr>
                <th>メールアドレス</th>
                <th>登録日</th>
                <th>プラン</th>
                <th>最終利用日</th>
              </tr>
            </thead>
            <tbody id="user-tbody">
              <tr><td colspan="4" style="color:var(--gray-400);padding:16px 0">読み込み中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="last-updated" id="last-updated"></div>

    </div><!-- /#dashboard -->

  </div><!-- /.container -->

  <!-- Supabase JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

  <script>
    // ════════════════════════════════════════════════════
    //  初期化・認証チェック
    // ════════════════════════════════════════════════════

    window.addEventListener('DOMContentLoaded', async function() {
      try {
        // /api/config から Supabase 設定を取得する
        const cfgRes = await fetch('/api/config');
        const cfg    = await cfgRes.json();

        if (!cfg.supabaseUrl || !cfg.supabaseAnonKey) {
          showError('設定エラー', 'Supabase が設定されていません。Vercel 環境変数を確認してください。');
          return;
        }

        const sbClient = window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);

        // 現在のセッションを取得する
        const { data: { session } } = await sbClient.auth.getSession();

        if (!session) {
          // 未ログイン → メインページへリダイレクト
          showError('ログインが必要です', '管理者ページにアクセスするにはログインしてください。');
          setTimeout(function() { window.location.href = '/'; }, 2500);
          return;
        }

        // ヘッダーにメールアドレスを表示する
        document.getElementById('admin-email').textContent = session.user.email;

        // ダッシュボードデータを取得する
        await loadDashboard(session.access_token);

      } catch (err) {
        showError('初期化エラー', err.message);
      }
    });

    // ════════════════════════════════════════════════════
    //  ダッシュボードデータ取得
    // ════════════════════════════════════════════════════

    async function loadDashboard(token) {
      try {
        const res = await fetch('/api/admin', {
          headers: { 'Authorization': 'Bearer ' + token },
        });

        if (res.status === 401) {
          showError('ログインが必要です', 'セッションが切れました。再ログインしてください。');
          setTimeout(function() { window.location.href = '/'; }, 2500);
          return;
        }
        if (res.status === 403) {
          showError('アクセス権限がありません', 'このページは管理者専用です。');
          return;
        }
        if (!res.ok) {
          const e = await res.json().catch(() => ({}));
          showError('APIエラー', e.error || 'データの取得に失敗しました。');
          return;
        }

        const data = await res.json();
        renderDashboard(data);

      } catch (err) {
        showError('通信エラー', err.message);
      }
    }

    // ════════════════════════════════════════════════════
    //  レンダリング
    // ════════════════════════════════════════════════════

    function renderDashboard(data) {
      // ── サマリー ────────────────────────────────────
      const total = data.total_this_month || 0;
      const users = data.active_users_this_month || 0;

      document.getElementById('stat-total').innerHTML =
        total + '<span class="stat-unit">回</span>';
      document.getElementById('stat-users').innerHTML =
        users + '<span class="stat-unit">人</span>';

      // ── 地域別バーチャート ───────────────────────────
      renderBarChart('region-bars', data.by_region || [], 'region', 'cnt');

      // ── アクション別バーチャート ─────────────────────
      // action 名を日本語ラベルに変換する
      const actionLabels = {
        'lookup':        '調べるモード',
        'quiz_generate': 'クイズ出題',
        'quiz_grade':    'クイズ採点',
      };
      const byAction = (data.by_action || []).map(function(r) {
        return { label: actionLabels[r.action] || r.action, cnt: r.cnt };
      });
      renderBarChart('action-bars', byAction, 'label', 'cnt');

      // ── ユーザーテーブル ─────────────────────────────
      const tbody  = document.getElementById('user-tbody');
      const users_ = data.users || [];
      tbody.innerHTML = '';

      if (users_.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" style="color:var(--gray-400);padding:16px 0">ユーザーなし</td></tr>';
      } else {
        users_.forEach(function(u) {
          const tr = document.createElement('tr');
          tr.innerHTML =
            '<td>' +
              escapeHtml(u.email || '（メールなし）') +
              (u.is_admin ? '<span class="admin-badge">Admin</span>' : '') +
            '</td>' +
            '<td class="date-text">' + fmtDate(u.created_at) + '</td>' +
            '<td><span class="plan-badge">' + escapeHtml(u.plan || 'standard') + '</span></td>' +
            '<td>' + (u.last_used
              ? '<span class="date-text">' + fmtDate(u.last_used) + '</span>'
              : '<span class="never-text">—</span>'
            ) + '</td>';
          tbody.appendChild(tr);
        });
      }

      // ── 最終更新 ─────────────────────────────────────
      document.getElementById('last-updated').textContent =
        '最終更新：' + new Date().toLocaleString('ja-JP');

      // ローディングを隠してダッシュボードを表示する
      document.getElementById('page-loading').style.display = 'none';
      document.getElementById('dashboard').style.display    = 'block';
    }

    // 横棒グラフを描画する
    function renderBarChart(containerId, items, labelKey, countKey) {
      const el  = document.getElementById(containerId);
      if (!el) return;
      if (!items || items.length === 0) {
        el.innerHTML = '<li style="color:var(--gray-400);font-size:0.85rem;padding:12px 0">今月のデータなし</li>';
        return;
      }
      // 最大値を基準に棒の幅を計算する
      const maxVal = Math.max.apply(null, items.map(function(r) { return r[countKey] || 0; }));
      el.innerHTML = '';
      items.forEach(function(r) {
        const cnt  = r[countKey] || 0;
        const pct  = maxVal > 0 ? Math.round(cnt / maxVal * 100) : 0;
        const li   = document.createElement('li');
        li.className = 'bar-item';
        li.innerHTML =
          '<span class="bar-label">' + escapeHtml(String(r[labelKey] || '—')) + '</span>' +
          '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%"></div></div>' +
          '<span class="bar-count">' + cnt + '</span>';
        el.appendChild(li);
      });
    }

    // ════════════════════════════════════════════════════
    //  エラー表示
    // ════════════════════════════════════════════════════

    function showError(title, body) {
      document.getElementById('page-loading').style.display = 'none';
      document.getElementById('page-error').style.display  = 'block';
      document.getElementById('error-title').textContent   = title;
      document.getElementById('error-body').textContent    = body;
    }

    // ════════════════════════════════════════════════════
    //  ユーティリティ
    // ════════════════════════════════════════════════════

    // ISO 日付文字列を「YYYY/MM/DD」にフォーマットする
    function fmtDate(iso) {
      if (!iso) return '—';
      return new Date(iso).toLocaleDateString('ja-JP');
    }

    // XSS 対策
    function escapeHtml(str) {
      const d = document.createElement('div');
      d.appendChild(document.createTextNode(str));
      return d.innerHTML;
    }
  </script>
</body>
</html>
