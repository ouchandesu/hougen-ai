<!DOCTYPE html>
<!-- 方言教育ツール - 新人アナウンサー向け日本各地の方言学習アプリ -->
<html lang="ja">
<head>
  <!-- 文字コードの指定 -->
  <meta charset="UTF-8">
  <!-- レスポンシブ対応のビューポート設定 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- ページタイトル -->
  <title>方言ナビ - アナウンサー向け方言学習ツール</title>
  <style>
    /* ページ全体のリセットとフォント設定 */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ボディのベーススタイル */
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      background-color: #f4f6f8;
      color: #333;
      min-height: 100vh;
      padding: 24px 16px;
    }

    /* ヘッダーエリアのスタイル */
    header {
      text-align: center;
      margin-bottom: 28px;
    }

    /* メインタイトルのスタイル */
    header h1 {
      font-size: 2rem;
      color: #1a3c5e;
      letter-spacing: 0.05em;
    }

    /* サブタイトルのスタイル */
    header p {
      margin-top: 6px;
      font-size: 0.9rem;
      color: #666;
    }

    /* コンテンツの最大幅とセンタリング */
    .container {
      max-width: 760px;
      margin: 0 auto;
    }

    /* カードコンポーネントの共通スタイル */
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    /* カード内の見出しスタイル */
    .card h2 {
      font-size: 1rem;
      color: #1a3c5e;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* 見出し左のアクセントバー */
    .card h2::before {
      content: '';
      display: inline-block;
      width: 4px;
      height: 1em;
      background: #3a7bd5;
      border-radius: 2px;
    }

    /* APIキー入力フィールドのスタイル */
    .api-key-input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #cdd4db;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: monospace;
      color: #333;
      transition: border-color 0.2s;
    }

    /* APIキー入力フォーカス時の強調 */
    .api-key-input:focus {
      outline: none;
      border-color: #3a7bd5;
      box-shadow: 0 0 0 3px rgba(58, 123, 213, 0.15);
    }

    /* APIキーの注意書きテキスト */
    .api-key-note {
      margin-top: 8px;
      font-size: 0.78rem;
      color: #888;
    }

    /* 方言入力テキストエリアのスタイル */
    #dialect-input {
      width: 100%;
      height: 100px;
      padding: 12px 14px;
      border: 1px solid #cdd4db;
      border-radius: 8px;
      font-size: 1.1rem;
      resize: vertical;
      font-family: inherit;
      line-height: 1.6;
      transition: border-color 0.2s;
    }

    /* テキストエリアフォーカス時の強調 */
    #dialect-input:focus {
      outline: none;
      border-color: #3a7bd5;
      box-shadow: 0 0 0 3px rgba(58, 123, 213, 0.15);
    }

    /* 「調べる」ボタンのスタイル */
    #search-btn {
      display: block;
      width: 100%;
      margin-top: 14px;
      padding: 14px;
      background: #3a7bd5;
      color: #fff;
      font-size: 1.05rem;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 0.08em;
      transition: background 0.2s, transform 0.1s;
    }

    /* ボタンホバー時の色変更 */
    #search-btn:hover {
      background: #2c63b5;
    }

    /* ボタン押下時の沈み込み効果 */
    #search-btn:active {
      transform: scale(0.98);
    }

    /* ボタン無効状態のスタイル */
    #search-btn:disabled {
      background: #a0b4cc;
      cursor: not-allowed;
      transform: none;
    }

    /* ローディングスピナーのアニメーション定義 */
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ローディング表示エリアのスタイル */
    #loading {
      display: none;
      text-align: center;
      padding: 32px;
      color: #666;
      font-size: 0.95rem;
    }

    /* ローディングアイコンのスタイルとアニメーション */
    #loading .spinner {
      display: inline-block;
      width: 28px;
      height: 28px;
      border: 3px solid #cdd4db;
      border-top-color: #3a7bd5;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }

    /* 結果表示エリアの初期非表示 */
    #result-area {
      display: none;
    }

    /* 各結果セクションの区切りスタイル */
    .result-section {
      border-bottom: 1px solid #f0f0f0;
      padding-bottom: 16px;
      margin-bottom: 16px;
    }

    /* 最後のセクションは区切り線を非表示 */
    .result-section:last-child {
      border-bottom: none;
      padding-bottom: 0;
      margin-bottom: 0;
    }

    /* 結果セクションのラベルスタイル */
    .result-section .label {
      font-size: 0.78rem;
      font-weight: bold;
      color: #3a7bd5;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    /* 結果の本文テキストスタイル */
    .result-section .value {
      font-size: 1rem;
      line-height: 1.8;
      color: #333;
    }

    /* 地域バッジのスタイル */
    .region-badge {
      display: inline-block;
      background: #e8f0fb;
      color: #1a3c5e;
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 0.95rem;
      font-weight: bold;
    }

    /* 例文ブロックのスタイル */
    .example-block {
      background: #f8f9fb;
      border-left: 3px solid #3a7bd5;
      border-radius: 0 8px 8px 0;
      padding: 12px 16px;
      margin-top: 8px;
    }

    /* 例文内の各行スタイル */
    .example-block p {
      font-size: 0.98rem;
      line-height: 1.7;
      color: #444;
    }

    /* 方言例文の強調スタイル */
    .example-block .dialect-line {
      font-weight: bold;
      color: #1a3c5e;
    }

    /* 標準語訳の色スタイル */
    .example-block .standard-line {
      color: #555;
    }

    /* エラーメッセージのスタイル */
    #error-msg {
      display: none;
      background: #fff2f2;
      border: 1px solid #f5c6cb;
      border-radius: 8px;
      padding: 14px 18px;
      color: #c0392b;
      font-size: 0.95rem;
      margin-bottom: 20px;
    }

    /* フッターのスタイル */
    footer {
      text-align: center;
      color: #aaa;
      font-size: 0.78rem;
      margin-top: 32px;
    }
  </style>
</head>
<body>

  <!-- ページヘッダー -->
  <header>
    <h1>方言ナビ</h1>
    <p>アナウンサーのための日本方言学習ツール</p>
  </header>

  <!-- メインコンテンツのコンテナ -->
  <div class="container">

    <!-- APIキー入力カード -->
    <div class="card">
      <h2>APIキー設定</h2>
      <!-- Claude APIキーの入力欄（パスワード形式で非表示） -->
      <input
        type="password"
        id="api-key"
        class="api-key-input"
        placeholder="sk-ant-api03-... を入力してください"
        autocomplete="off"
      />
      <!-- APIキーの取得先案内 -->
      <p class="api-key-note">※ APIキーは Anthropic Console (console.anthropic.com) で取得できます。このページ外に送信されることはありません。</p>
    </div>

    <!-- 方言入力カード -->
    <div class="card">
      <h2>方言・単語を入力</h2>
      <!-- 調べたい方言や単語を入力するテキストエリア -->
      <textarea
        id="dialect-input"
        placeholder="例：ほやほや、いきなり（熊本）、がめつい、なんくるないさ...など方言・単語を入力してください"
      ></textarea>
      <!-- 調べるボタン：クリックでAPI呼び出しを実行 -->
      <button id="search-btn" onclick="searchDialect()">調べる</button>
    </div>

    <!-- エラーメッセージ表示エリア（エラー時のみ表示） -->
    <div id="error-msg"></div>

    <!-- ローディング表示エリア（API通信中に表示） -->
    <div id="loading">
      <div class="spinner"></div>
      <p>方言を分析中です...</p>
    </div>

    <!-- 結果表示エリア（API応答後に表示） -->
    <div id="result-area" class="card">
      <h2>調査結果</h2>

      <!-- 地域情報セクション -->
      <div class="result-section">
        <div class="label">使われる地域</div>
        <!-- 地域名をバッジ形式で表示 -->
        <div class="value" id="result-region"></div>
      </div>

      <!-- 標準語訳セクション -->
      <div class="result-section">
        <div class="label">標準語での意味</div>
        <div class="value" id="result-meaning"></div>
      </div>

      <!-- 使われる場面・ニュアンスセクション -->
      <div class="result-section">
        <div class="label">使われる場面・ニュアンス</div>
        <div class="value" id="result-nuance"></div>
      </div>

      <!-- 例文セクション（方言と標準語訳） -->
      <div class="result-section">
        <div class="label">例文</div>
        <div id="result-examples"></div>
      </div>

    </div>

  </div>

  <!-- フッター -->
  <footer>
    <p>Powered by Claude API &nbsp;|&nbsp; 方言ナビ &copy; 2024</p>
  </footer>

  <script>
    // 「調べる」ボタンが押されたときのメイン処理関数
    async function searchDialect() {
      // 入力値とAPIキーを取得する
      const dialect = document.getElementById('dialect-input').value.trim();
      const apiKey  = document.getElementById('api-key').value.trim();

      // 入力チェック：方言が未入力の場合はアラートを表示して処理を中断
      if (!dialect) {
        showError('方言または単語を入力してください。');
        return;
      }

      // 入力チェック：APIキーが未入力の場合はアラートを表示して処理を中断
      if (!apiKey) {
        showError('APIキーを入力してください。');
        return;
      }

      // UIの状態をリセット・ローディング開始
      hideError();
      showLoading(true);
      setButtonState(false);
      document.getElementById('result-area').style.display = 'none';

      // Claude APIに送るプロンプトを構築する
      const prompt = `あなたは日本の方言の専門家です。以下の方言または単語について、アナウンサーが学習するために必要な情報を教えてください。

方言・単語：「${dialect}」

以下のJSON形式で回答してください。JSONのみを返し、余分なテキストは含めないでください。

{
  "region": "使われる主な地域（都道府県名や地域名）",
  "meaning": "標準語での意味（わかりやすく説明）",
  "nuance": "使われる場面やニュアンス（感情、丁寧さ、使用シーンなど）",
  "examples": [
    {
      "dialect": "方言を使った例文",
      "standard": "標準語訳"
    },
    {
      "dialect": "方言を使った別の例文",
      "standard": "標準語訳"
    }
  ]
}

もし有名な方言でない、または意味が不明な場合は、region に「不明」、meaning に「この言葉は一般的な方言として確認できませんでした」と入力してください。`;

      try {
        // Claude Messages APIにリクエストを送信する
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            // 認証ヘッダーにAPIキーを設定
            'x-api-key': apiKey,
            // Anthropic APIバージョンの指定
            'anthropic-version': '2023-06-01',
            // リクエストボディの形式指定
            'content-type': 'application/json',
            // ブラウザからの直接アクセスを許可するためのCORSヘッダー
            'anthropic-dangerous-direct-browser-access': 'true'
          },
          body: JSON.stringify({
            // 使用するClaudeモデルの指定
            model: 'claude-sonnet-4-6',
            // レスポンスの最大トークン数
            max_tokens: 1024,
            // ユーザーからのメッセージ
            messages: [
              { role: 'user', content: prompt }
            ]
          })
        });

        // HTTPエラーレスポンスの処理
        if (!response.ok) {
          // エラーの詳細をレスポンスから取得する
          const errData = await response.json().catch(() => ({}));
          // エラーメッセージを構築して表示
          throw new Error(
            errData.error?.message || `APIエラー: ${response.status} ${response.statusText}`
          );
        }

        // 正常なレスポンスのJSON解析
        const data = await response.json();

        // APIレスポンスからテキスト部分を取得する
        const rawText = data.content?.[0]?.text || '';

        // レスポンスのJSONテキストをパースする
        let result;
        try {
          // コードブロック記号（```json ... ```）を除去してからパース
          const cleaned = rawText.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
          result = JSON.parse(cleaned);
        } catch {
          // JSONパースに失敗した場合はエラーを投げる
          throw new Error('APIのレスポンスを解析できませんでした。もう一度お試しください。');
        }

        // 結果をUIに反映する
        displayResult(result, dialect);

      } catch (err) {
        // 通信エラーやパースエラーをユーザーに表示する
        showError('エラーが発生しました：' + err.message);
      } finally {
        // 処理完了後はローディングを非表示にしてボタンを再有効化
        showLoading(false);
        setButtonState(true);
      }
    }

    // 結果をUIに描画する関数
    function displayResult(result, inputDialect) {
      // 地域情報をバッジ形式で表示する
      const regionEl = document.getElementById('result-region');
      regionEl.innerHTML = `<span class="region-badge">📍 ${escapeHtml(result.region || '不明')}</span>`;

      // 標準語の意味を表示する
      document.getElementById('result-meaning').textContent = result.meaning || '情報なし';

      // ニュアンス・使われる場面を表示する
      document.getElementById('result-nuance').textContent = result.nuance || '情報なし';

      // 例文セクションを構築して表示する
      const examplesEl = document.getElementById('result-examples');
      examplesEl.innerHTML = ''; // 以前の例文をクリアする

      // 例文配列が存在する場合はそれぞれのブロックを生成する
      if (Array.isArray(result.examples) && result.examples.length > 0) {
        result.examples.forEach((ex, idx) => {
          // 例文ブロックのHTML要素を作成する
          const block = document.createElement('div');
          block.className = 'example-block';
          // 番号付きで方言例文と標準語訳を表示する
          block.innerHTML = `
            <p class="dialect-line">【方言】${escapeHtml(ex.dialect || '')}</p>
            <p class="standard-line">【標準語】${escapeHtml(ex.standard || '')}</p>
          `;
          // 2件目以降は上マージンを追加
          if (idx > 0) block.style.marginTop = '10px';
          examplesEl.appendChild(block);
        });
      } else {
        // 例文がない場合のメッセージ
        examplesEl.textContent = '例文がありませんでした。';
      }

      // 結果エリアをフェードインで表示する
      const resultArea = document.getElementById('result-area');
      resultArea.style.display  = 'block';
      resultArea.style.opacity  = '0';
      resultArea.style.transition = 'opacity 0.3s ease';
      // 次フレームでopacityを1にしてアニメーションを開始
      requestAnimationFrame(() => {
        resultArea.style.opacity = '1';
      });

      // 結果エリアまでスムーズスクロール
      resultArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // ローディング表示の切り替え関数
    function showLoading(visible) {
      document.getElementById('loading').style.display = visible ? 'block' : 'none';
    }

    // ボタンの有効・無効状態を切り替える関数
    function setButtonState(enabled) {
      const btn = document.getElementById('search-btn');
      btn.disabled  = !enabled;
      btn.textContent = enabled ? '調べる' : '調べています...';
    }

    // エラーメッセージを表示する関数
    function showError(message) {
      const el = document.getElementById('error-msg');
      el.textContent = '⚠️ ' + message;
      el.style.display = 'block';
    }

    // エラーメッセージを非表示にする関数
    function hideError() {
      document.getElementById('error-msg').style.display = 'none';
    }

    // XSS対策のためHTMLエスケープを行うユーティリティ関数
    function escapeHtml(str) {
      // テキストノードとして設定することでブラウザにエスケープさせる
      const div = document.createElement('div');
      div.appendChild(document.createTextNode(str));
      return div.innerHTML;
    }

    // Enterキーでも検索できるようにキーボードイベントを設定する
    document.getElementById('dialect-input').addEventListener('keydown', function(e) {
      // Ctrl+Enter または Cmd+Enter で調べるボタンを発動
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        searchDialect();
      }
    });
  </script>
</body>
</html>
