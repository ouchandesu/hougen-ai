<!DOCTYPE html>
<!-- Claude API シンプルテスト用ページ -->
<html lang="ja">
<head>
  <!-- 文字コードをUTF-8に指定（日本語を正しく表示するため） -->
  <meta charset="UTF-8">
  <!-- スマホ・タブレットでも読みやすくするためのビューポート設定 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- ブラウザのタブに表示されるタイトル -->
  <title>Claude API テスト</title>

  <style>
    /* ページ全体のリセットと基本スタイル */
    * {
      box-sizing: border-box; /* パディングをwidth/heightに含める */
      margin: 0;              /* デフォルトのマージンをリセット */
      padding: 0;             /* デフォルトのパディングをリセット */
    }

    /* body全体のレイアウト */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; /* OSに応じたシステムフォント */
      background: #f0f2f5;    /* 薄いグレーの背景色 */
      color: #1a1a2e;         /* 濃いネイビーの文字色 */
      min-height: 100vh;      /* 画面の高さいっぱいに広げる */
      padding: 32px 16px;     /* 上下32px、左右16pxの余白 */
    }

    /* メインコンテンツのコンテナ */
    .container {
      max-width: 760px;       /* 最大幅760pxに制限 */
      margin: 0 auto;         /* 左右中央寄せ */
    }

    /* ページの見出し */
    h1 {
      font-size: 1.5rem;      /* フォントサイズ */
      font-weight: 700;       /* 太字 */
      margin-bottom: 8px;     /* 下に8pxの余白 */
      color: #1a1a2e;         /* 文字色 */
    }

    /* 見出し下のサブテキスト */
    .subtitle {
      font-size: 0.875rem;    /* 少し小さいフォントサイズ */
      color: #6b7280;         /* グレーの文字色 */
      margin-bottom: 28px;    /* 下に28pxの余白 */
    }

    /* カード型のUIパネル */
    .card {
      background: white;          /* 白い背景 */
      border-radius: 8px;         /* 角を丸くする */
      border: 1px solid #e5e7eb;  /* 薄いグレーのボーダー */
      padding: 20px;              /* カード内の余白 */
      margin-bottom: 16px;        /* カード間の余白 */
    }

    /* 入力フィールドのグループ（ラベル＋入力欄のセット） */
    .field {
      margin-bottom: 16px;  /* フィールド間の余白 */
    }

    /* 各フィールドの最後の要素はマージンなし */
    .field:last-child {
      margin-bottom: 0;
    }

    /* ラベルのスタイル */
    label {
      display: block;           /* ブロック要素にして改行を入れる */
      font-size: 0.875rem;      /* 小さめのフォントサイズ */
      font-weight: 600;         /* やや太字 */
      color: #374151;           /* ダークグレーの文字色 */
      margin-bottom: 6px;       /* 入力欄との間隔 */
    }

    /* テキスト・パスワード入力欄の共通スタイル */
    input[type="text"],
    input[type="password"] {
      width: 100%;              /* 横幅いっぱい */
      padding: 9px 12px;        /* 内側の余白 */
      font-size: 0.9rem;        /* フォントサイズ */
      border: 1px solid #d1d5db; /* グレーのボーダー */
      border-radius: 6px;       /* 角を丸くする */
      outline: none;            /* フォーカス時のデフォルト輪郭を消す */
      transition: border-color 0.2s; /* ボーダーの色変化にアニメーション */
    }

    /* 入力欄がフォーカスされたときのスタイル */
    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: #3b82f6;    /* フォーカス時はブルーのボーダー */
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); /* 薄い青のグロー効果 */
    }

    /* テキストエリア（メッセージ入力欄）のスタイル */
    textarea {
      width: 100%;              /* 横幅いっぱい */
      padding: 9px 12px;        /* 内側の余白 */
      font-size: 0.9rem;        /* フォントサイズ */
      font-family: inherit;     /* 親要素のフォントを引き継ぐ */
      border: 1px solid #d1d5db; /* グレーのボーダー */
      border-radius: 6px;       /* 角を丸くする */
      outline: none;            /* フォーカス時のデフォルト輪郭を消す */
      resize: vertical;         /* 縦方向のみリサイズ可能 */
      min-height: 130px;        /* 最小の高さ */
      line-height: 1.6;         /* 行の高さ */
      transition: border-color 0.2s; /* ボーダーの色変化にアニメーション */
    }

    /* テキストエリアがフォーカスされたときのスタイル */
    textarea:focus {
      border-color: #3b82f6;    /* フォーカス時はブルーのボーダー */
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); /* 薄い青のグロー効果 */
    }

    /* ヒントテキスト（入力欄の下に表示する補足説明） */
    .hint {
      font-size: 0.78rem;   /* 小さいフォントサイズ */
      color: #9ca3af;       /* 薄いグレーの文字色 */
      margin-top: 4px;      /* 入力欄との間隔 */
    }

    /* 送信ボタンのスタイル */
    #send-btn {
      display: inline-flex;   /* flexboxで中身を中央揃え */
      align-items: center;    /* 縦方向中央揃え */
      gap: 6px;               /* アイコンとテキストの間隔 */
      padding: 10px 22px;     /* ボタン内の余白 */
      font-size: 0.95rem;     /* フォントサイズ */
      font-weight: 600;       /* やや太字 */
      background: #2563eb;    /* ブルーの背景色 */
      color: white;           /* 白い文字 */
      border: none;           /* ボーダーなし */
      border-radius: 6px;     /* 角を丸くする */
      cursor: pointer;        /* ホバー時にポインターカーソル */
      transition: background 0.2s; /* 背景色の変化にアニメーション */
    }

    /* ボタンのホバー時（無効化されていない場合のみ） */
    #send-btn:hover:not(:disabled) {
      background: #1d4ed8;  /* 少し濃いブルー */
    }

    /* ボタンが無効化（API呼び出し中）されているときのスタイル */
    #send-btn:disabled {
      background: #93c5fd;  /* 薄いブルー */
      cursor: not-allowed;  /* 禁止カーソル */
    }

    /* エラーメッセージボックス */
    #error-box {
      display: none;                  /* 初期状態は非表示 */
      margin-top: 14px;               /* 上に余白 */
      padding: 12px 14px;             /* 内側の余白 */
      background: #fef2f2;            /* 薄い赤の背景 */
      border: 1px solid #fca5a5;      /* 赤いボーダー */
      border-radius: 6px;             /* 角を丸くする */
      font-size: 0.875rem;            /* フォントサイズ */
      color: #b91c1c;                 /* 濃い赤の文字色 */
      line-height: 1.5;               /* 行の高さ */
      white-space: pre-wrap;          /* 改行を保持する */
    }

    /* レスポンス表示カード（デフォルトは非表示） */
    #response-section {
      display: none;  /* JavaScriptで表示・非表示を切り替える */
    }

    /* レスポンス表示カードの見出し */
    #response-section .card-title {
      font-size: 0.875rem;    /* フォントサイズ */
      font-weight: 600;       /* やや太字 */
      color: #6b7280;         /* グレーの文字色 */
      margin-bottom: 10px;    /* 下に余白 */
      text-transform: uppercase; /* 大文字変換（英語の場合） */
      letter-spacing: 0.05em; /* 文字間隔を少し広げる */
    }

    /* レスポンスのテキスト表示エリア */
    #response-text {
      white-space: pre-wrap;  /* 改行と空白をそのまま表示 */
      font-size: 0.9rem;      /* フォントサイズ */
      line-height: 1.7;       /* 行の高さ（読みやすくする） */
      color: #111827;         /* ほぼ黒の文字色 */
      min-height: 60px;       /* 最小の高さ */
    }

    /* ローディング中のテキストスタイル */
    #response-text.loading {
      color: #6b7280;       /* グレーの文字色 */
      font-style: italic;   /* 斜体 */
    }
  </style>
</head>
<body>
  <!-- ページ全体のコンテナ -->
  <div class="container">

    <!-- ページのヘッダー部分 -->
    <h1>Claude API テスト</h1>
    <!-- サブタイトル：APIキーが直接入力される注意書き -->
    <p class="subtitle">テスト用 — APIキーはブラウザ上でのみ使用され、外部サーバーには送信されません</p>

    <!-- APIキーとメッセージ入力のカード -->
    <div class="card">

      <!-- APIキーの入力フィールド -->
      <div class="field">
        <!-- ラベル：クリックで対応する入力欄にフォーカスが当たる -->
        <label for="api-key">Anthropic APIキー</label>
        <!-- type="password" にして入力内容をマスクする -->
        <input
          type="password"
          id="api-key"
          placeholder="sk-ant-api03-..."
          autocomplete="off"
          spellcheck="false"
        >
        <!-- APIキーの取得先とセキュリティに関する注意 -->
        <p class="hint">console.anthropic.com で発行できます。テスト専用にし、本番コードには埋め込まないでください。</p>
      </div>

      <!-- メッセージ入力フィールド -->
      <div class="field">
        <!-- ラベル -->
        <label for="user-input">メッセージ</label>
        <!-- メッセージ入力用テキストエリア -->
        <textarea
          id="user-input"
          placeholder="Claudeに送るメッセージを入力してください..."
        ></textarea>
        <!-- ショートカットキーのヒント -->
        <p class="hint">Ctrl+Enter（Mac: ⌘+Enter）でも送信できます</p>
      </div>

      <!-- 送信ボタン -->
      <button id="send-btn" onclick="sendMessage()">送信</button>

      <!-- エラーメッセージ表示エリア（エラー発生時のみ表示） -->
      <div id="error-box"></div>
    </div>

    <!-- レスポンス表示セクション（送信後に表示される） -->
    <div id="response-section" class="card">
      <!-- セクションのラベル -->
      <p class="card-title">レスポンス</p>
      <!-- Claudeからの応答テキストが入る要素 -->
      <div id="response-text"></div>
    </div>

  </div><!-- /.container -->

  <script>
    // 使用するClaudeモデルID（変更したい場合はここを書き換える）
    const MODEL_ID = "claude-opus-4-8";

    // Anthropic Messages APIのエンドポイントURL
    const API_URL = "https://api.anthropic.com/v1/messages";

    // 送信ボタンを押したとき（またはCtrl+Enterを押したとき）に実行される非同期関数
    async function sendMessage() {
      // 各DOM要素への参照を取得
      const apiKeyInput    = document.getElementById("api-key");       // APIキー入力欄
      const userInput      = document.getElementById("user-input");    // メッセージ入力欄
      const sendBtn        = document.getElementById("send-btn");      // 送信ボタン
      const errorBox       = document.getElementById("error-box");     // エラー表示エリア
      const responseSection= document.getElementById("response-section"); // レスポンスセクション
      const responseText   = document.getElementById("response-text"); // レスポンステキスト要素

      // 入力欄の値を取得し、前後の空白を除去する
      const apiKey  = apiKeyInput.value.trim();   // APIキー
      const message = userInput.value.trim();     // ユーザーのメッセージ

      // ---- バリデーション ----

      // APIキーが入力されていない場合はエラーを表示して処理を止める
      if (!apiKey) {
        showError("APIキーを入力してください。");
        return; // 処理を中断
      }

      // メッセージが入力されていない場合はエラーを表示して処理を止める
      if (!message) {
        showError("メッセージを入力してください。");
        return; // 処理を中断
      }

      // ---- UI状態をローディング中に更新 ----

      // 連続送信を防ぐためボタンを無効化
      sendBtn.disabled = true;
      sendBtn.textContent = "送信中...";

      // 前回のエラーを非表示にする
      errorBox.style.display = "none";
      errorBox.textContent = "";

      // レスポンスセクションを表示し、ローディングメッセージをセット
      responseSection.style.display = "block";
      responseText.className = "loading";         // ローディング用のCSSクラスを適用
      responseText.textContent = "Claudeが応答中...";

      try {
        // ---- APIリクエストを送信 ----

        // fetchでAnthropicのAPIにPOSTリクエストを送る
        const res = await fetch(API_URL, {
          method: "POST",   // HTTPメソッドはPOST
          headers: {
            "Content-Type": "application/json",   // リクエストボディはJSON形式
            "x-api-key": apiKey,                  // APIキーで認証
            "anthropic-version": "2023-06-01",    // 使用するAPIバージョン
            // ブラウザから直接APIを呼び出すことを明示的に許可するヘッダー
            // （本番環境ではバックエンドを経由してAPIキーを保護してください）
            "anthropic-dangerous-direct-browser-access": "true",
          },
          // リクエストボディをJSON文字列に変換して送る
          body: JSON.stringify({
            model: MODEL_ID,    // 使用するモデル
            max_tokens: 1024,   // 生成するトークンの最大数
            messages: [
              {
                role: "user",       // ロールはuser（ユーザーの発言）
                content: message,   // ユーザーが入力したメッセージ
              },
            ],
          }),
        });

        // ---- レスポンスをパース ----

        // レスポンスのJSONを取得する
        const data = await res.json();

        // HTTPステータスコードが2xx以外（エラー）の場合
        if (!res.ok) {
          // APIが返したエラーメッセージを取得（なければデフォルトメッセージ）
          const errMsg = data?.error?.message
            || `APIエラー (HTTP ${res.status})`;
          // エラーをthrowして下のcatchブロックで処理する
          throw new Error(errMsg);
        }

        // ---- 正常レスポンスの処理 ----

        // content配列からtypeが"text"のブロックだけをフィルタリング
        const textBlocks = (data.content || []).filter(b => b.type === "text");

        // テキストブロックが1件もない場合はエラーにする
        if (textBlocks.length === 0) {
          throw new Error("テキストのレスポンスが含まれていませんでした。");
        }

        // 複数テキストブロックがある場合は改行でつなぐ
        const fullText = textBlocks.map(b => b.text).join("\n");

        // ローディングクラスを外してレスポンステキストを表示
        responseText.className = "";          // ローディングスタイルを解除
        responseText.textContent = fullText;  // レスポンスのテキストをセット

      } catch (err) {
        // ---- エラー処理 ----

        // レスポンスセクションを非表示に戻す
        responseSection.style.display = "none";

        // エラーメッセージを画面に表示する
        showError(err.message || "予期しないエラーが発生しました。");

      } finally {
        // ---- 後処理（成功・失敗どちらでも必ず実行） ----

        // ボタンを元の状態に戻す
        sendBtn.disabled = false;
        sendBtn.textContent = "送信";
      }
    }

    // エラーメッセージを表示するユーティリティ関数
    function showError(message) {
      // エラーボックスの要素を取得
      const errorBox = document.getElementById("error-box");
      // エラーメッセージのテキストをセット
      errorBox.textContent = "⚠ " + message;
      // エラーボックスを表示状態にする（display: noneを解除）
      errorBox.style.display = "block";
    }

    // テキストエリアでCtrl+Enter（またはMacの⌘+Enter）を押したときの処理
    document.getElementById("user-input").addEventListener("keydown", function (e) {
      // CtrlキーまたはMetaキー（⌘）が押されていて、かつEnterキーが押された場合
      if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
        e.preventDefault();   // デフォルトの改行挿入を防ぐ
        sendMessage();        // 送信処理を実行
      }
    });
  </script>
</body>
</html>
